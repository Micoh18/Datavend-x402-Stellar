<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon vend.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <title>DataVend — Marketplace de datos de sensores</title>
    <meta name="description" content="Marketplace de datos de sensores de vi&ntilde;edos. Compr&aacute; lecturas de temperatura, humedad y pH con micropagos USDC via x402 sobre Stellar.">
    <meta property="og:title" content="DataVend — Sensor Data Marketplace">
    <meta property="og:description" content="Micropagos por datos de sensores reales sobre Stellar. HTTP 402 + USDC.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#722F37">
    <script>
      // Prevent FOUC — apply saved theme before first paint
      (function() {
        var s = localStorage.getItem('datavend-theme');
        var dark = s ? s === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body class="bg-base text-txt min-h-screen transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
